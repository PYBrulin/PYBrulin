        </g>
        <!-- <g transform="translate(0,360)">
            <image
                href="profile-summary-card-output/transparent/3-stats.svg" />
        </g>
        <g transform="translate(360,360)">
            <image
                href="profile-summary-card-output/transparent/4-productive-time.svg" />
